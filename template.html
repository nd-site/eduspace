<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">EduSpace by ND Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #0070f3; --primary-light: #3291ff; --bg-main: #f0f7ff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: #0f172a; overflow-x: hidden; }
        .bg-blob { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 112, 243, 0.08) 0%, rgba(255, 255, 255, 0) 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid #ffffff; box-shadow: 0 20px 40px -12px rgba(0, 112, 243, 0.08); }
        .round-card { border-radius: 32px; }
        .pill-shape { border-radius: 9999px; }

        .option-card { transition: all 0.2s; cursor: pointer; border: 2px solid #f1f5f9; background: #ffffff; border-radius: 9999px; }
        .option-card.selected { border-color: var(--primary); background: #f0f7ff; color: var(--primary); }
        .option-card.selected span:first-child { background: var(--primary); color: white; }

        .btn-nav-blue { border: 2px solid var(--primary); color: var(--primary); font-weight: 800; transition: all 0.2s; }
        .btn-nav-blue:hover:not(:disabled) { background: var(--primary); color: white; }
        .btn-nav-blue:disabled { opacity: 0.3; cursor: not-allowed; border-color: #cbd5e1; color: #cbd5e1; }
        .btn-main { background: var(--primary); color: white; transition: all 0.3s; box-shadow: 0 8px 16px -4px rgba(0, 112, 243, 0.3); }
        .btn-main:hover:not(:disabled) { transform: translateY(-2px); background: #0060d3; }
        #custom-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 24px; padding: 32px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .input-pill { width: 100%; padding: 0.75rem 1.5rem; border-radius: 9999px; border: 2px solid #f1f5f9; outline: none; transition: all 0.3s; }
        .input-pill:focus { border-color: var(--primary-light); }

        .short-ans-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin: 3rem auto 2rem; }
        .input-short {
            width: 220px;
            padding: 1.25rem 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 14px;
            text-align: center;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 9999px;
            color: var(--primary);
            caret-color: var(--primary);
            outline: none;
            box-shadow: 0 6px 20px rgba(0, 112, 243, 0.12);
        }
        .input-short:focus { border-color: var(--primary-light); box-shadow: 0 10px 30px rgba(0, 112, 243, 0.2); }

        #options-container textarea#ans-input {
            width: 100%;
            max-width: 680px;
            min-height: 220px;
            margin: 2rem auto 1rem;
            display: block;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 1.5rem 1.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        #options-container textarea#ans-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 8px 25px rgba(0, 112, 243, 0.15);
            outline: none;
        }

        .btn-icon-nav { padding: 8px; border-radius: 12px; transition: all 0.2s; color: #64748b; }
        .btn-icon-nav:hover { background: #f1f5f9; color: var(--primary); }
        .q-image-container { width: 100%; max-height: 260px; overflow: hidden; border-radius: 16px; margin-bottom: 1.5rem; background: #f1f5f9; display: flex; justify-content: center; align-items: center; }
        .q-image-container img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .tf-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 16px; background: white; border: 2px solid #f1f5f9; transition: all 0.2s; margin-bottom: 12px; }
        .tf-row:hover { border-color: #cbd5e1; }
        .tf-label { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: #64748b; font-weight: 800; font-size: 13px; border-radius: 9999px; }
        .tf-content { flex: 1; font-size: 15px; font-weight: 600; line-height: 1.4; color: #1e293b; }
        .tf-btn { min-width: 72px; height: 36px; padding: 0 12px; border-radius: 9999px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all 0.18s; cursor: pointer; user-select: none; background: #ffffff; border: 2px solid #cbd5e1; color: #475569; }
        .tf-btn:hover:not(.selected) { border-color: #94a3b8; background: #f8fafc; }
        .tf-btn.selected { border-color: var(--primary); background: #f0f7ff; color: var(--primary); font-weight: 800; }

        /* Thanh tiến trình - LUÔN BẮT ĐẦU TỪ ĐẦU KHI DÀI */
        #question-progress-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 12px;
            justify-content: flex-start;   /* bắt đầu từ trái (đầu) khi dài */
            margin-bottom: 1.5rem;
            padding: 12px 20px;            /* padding hai bên để đẹp */
            background: rgba(255,255,255,0.7);
            border-radius: 16px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        #question-progress-bar::-webkit-scrollbar {
            height: 6px;
        }
        #question-progress-bar::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .question-progress-item {
            width: 40px;
            height: 40px;
            flex: 0 0 auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .question-progress-item.current { border-color: var(--primary); background: var(--primary); transform: scale(1.2); }
        .question-progress-item.answered { background: #94a3b8; }
        .question-progress-item.correct { background: #10b981; }
        .question-progress-item.incorrect { background: #ef4444; }
        .question-progress-item:hover { transform: scale(1.15); }

        /* Kết quả chi tiết */
        #detail-result-container { margin-top: 2rem; padding: 1.5rem; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .detail-question { margin-bottom: 1.5rem; padding: 1.25rem; background: #f8fafc; border-radius: 16px; border-left: 6px solid #cbd5e1; transition: all 0.3s; }
        .detail-question.correct { border-left-color: #10b981; background: #f0fdf4; }
        .detail-question.incorrect { border-left-color: #ef4444; background: #fef2f2; }
        .detail-question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .detail-question-header h4 { font-size: 1.25rem; font-weight: 700; }
        .detail-score { font-size: 1.25rem; font-weight: 800; }
        .detail-your-answer, .detail-correct-answer { margin: 0.75rem 0; padding: 0.75rem; border-radius: 10px; font-weight: 600; }
        .detail-your-answer { background: #e0f2fe; color: #1e40af; }
        .detail-correct-answer { background: #ecfdf5; color: #065f46; }
        .detail-explanation { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; color: #4b5563; }

        .question-content table, .explanation-content table { margin: 1rem auto; border-collapse: collapse; font-size: 0.95rem; width: 100%; }
        .question-content th, .question-content td, .explanation-content th, .explanation-content td { border: 1px solid #cbd5e1; padding: 0.6rem 1rem; }
        .question-content th, .explanation-content th { background: #f1f5f9; font-weight: 700; }
        .question-content tr:nth-child(even), .explanation-content tr:nth-child(even) { background: #f8fafc; }
        .question-content img, .explanation-content img { max-height: 220px; max-width: 100%; object-fit: contain; border-radius: 8px; margin: 1rem auto; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

        #options-container { display: flex !important; flex-direction: column !important; gap: 16px !important; margin-top: 2rem !important; }
        .option-card { padding: 1.25rem 1.5rem; min-height: 68px; align-items: center; font-size: 1.05rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="bg-blob" style="top: -150px; right: -150px;"></div>
    <div class="bg-blob" style="bottom: -150px; left: -150px;"></div>

    <div id="custom-modal">
        <div class="modal-content fade-in">
            <div id="modal-icon" class="text-4xl mb-4">🔑</div>
            <h3 id="modal-title" class="text-xl font-extrabold text-slate-800 mb-2"></h3>
            <div id="modal-text" class="text-slate-500 mb-6 text-sm text-left leading-relaxed"></div>
            <div id="modal-actions" class="flex flex-col gap-2">
                <button id="modal-confirm" class="btn-main pill-shape py-3 font-bold text-sm">Đã hiểu</button>
                <button id="modal-cancel" class="text-slate-400 font-bold text-xs py-2 hidden">Hủy bỏ</button>
            </div>
        </div>
    </div>

    <div class="app-layout flex justify-center py-10 px-4">
        <div class="w-full max-w-xl">
            <!-- START SCREEN -->
            <div id="start-screen" class="glass-card round-card p-10 text-center fade-in relative">
                <div class="absolute top-6 left-6 flex gap-2">
                    <a href="#" class="btn-icon-nav" title="Về Eduspace">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    </a>
                </div>
                <div class="w-20 h-20 bg-blue-50 pill-shape flex items-center justify-center mx-auto mb-4 mt-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                </div>
                <h2 id="quiz-title-display" class="text-2xl font-extrabold text-slate-800 mb-2 uppercase tracking-tight">EduSpace by ND Labs</h2>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] mb-8">AI Smart Quiz Platform</p>
                <div class="mb-6 space-y-4">
                    <div class="relative">
                        <input type="password" id="api-key-input" placeholder="Nhập Gemini API Key" class="input-pill text-center border-slate-200 text-sm shadow-sm">
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-blue-600 font-bold text-[11px] uppercase tracking-wider hover:underline flex items-center gap-1">Lấy Key tại Google AI Studio</a>
                        <button onclick="showHelp()" class="text-slate-400 font-bold text-[10px] uppercase tracking-widest hover:text-slate-600 transition-colors">Cách lấy API Key & Tại sao?</button>
                    </div>
                </div>
                <div class="flex flex-col gap-3 px-6 mt-8">
                    <button onclick="initQuiz('practice')" class="btn-main pill-shape py-4 px-10 font-bold text-sm w-full">Luyện tập</button>
                    <button onclick="initQuiz('test')" class="bg-white border-2 border-slate-200 text-slate-700 hover:border-blue-400 hover:text-blue-600 transition-all pill-shape py-4 px-10 font-bold text-sm w-full">Kiểm tra (Tính giờ)</button>
                </div>
            </div>

            <!-- MAIN QUIZ -->
            <div id="main-quiz" class="hidden">
                <header class="flex items-center justify-between mb-5 glass-card pill-shape p-2 px-4">
                    <div class="flex items-center gap-1">
                        <button onclick="goBackToStart()" class="btn-icon-nav" title="Thoát">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                        </button>
                    </div>
                    <div id="ui-timer" class="text-blue-600 font-bold text-sm flex items-center gap-2">
                        <span id="timer-text" class="tabular-nums">00:00</span>
                    </div>
                    <div id="ui-progress" class="bg-blue-600 text-white pill-shape px-4 py-1.5 text-[10px] font-black uppercase tracking-widest">Câu 0/0</div>
                </header>

                <div id="question-progress-bar" class="flex gap-3 mb-4"></div>

                <main id="quiz-container">
                    <div id="question-card" class="glass-card round-card p-6 md:p-10 fade-in min-h-[420px] flex flex-col">
                        <div id="question-header"></div>
                        <div id="options-container" class="flex flex-col gap-4 mt-8 flex-1"></div>
                       
                        <div id="action-area" class="mt-8 flex flex-wrap items-center justify-between gap-4">
                            <div class="flex gap-2">
                                <button id="prev-btn" class="hidden btn-nav-blue pill-shape px-5 py-2 text-[10px] uppercase tracking-widest">Quay lại</button>
                                <button id="next-nav-btn" class="hidden btn-nav-blue pill-shape px-5 py-2 text-[10px] uppercase tracking-widest">Tiếp theo</button>
                            </div>
                            <div class="flex items-center gap-2 ml-auto">
                                <button id="submit-btn" class="btn-main pill-shape py-3 px-8 font-bold uppercase tracking-widest text-[11px] min-w-[140px]">Kiểm tra</button>
                                <button id="finish-test-btn" class="hidden btn-main pill-shape py-3 px-8 font-bold uppercase tracking-widest text-[11px] !bg-blue-600">Nộp bài</button>
                            </div>
                        </div>
                        <div id="explanation-container" class="mt-8 hidden fade-in">
                            <div class="bg-slate-50 round-card p-6 border border-slate-100">
                                <span id="result-badge" class="pill-shape px-4 py-1.5 text-[9px] font-black uppercase text-white mb-4 inline-block"></span>
                                <div id="explanation-text" class="explanation-content text-slate-600 text-sm leading-relaxed mb-6"></div>
                                <button id="next-btn-exp" class="w-full btn-main pill-shape py-4 font-bold text-sm">Câu tiếp theo</button>
                            </div>
                        </div>
                    </div>
                </main>
            </div>

            <!-- KẾT QUẢ -->
            <div id="result-screen" class="hidden glass-card round-card p-8 md:p-10 fade-in">
                <div class="flex flex-col items-center mb-8">
                    <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-5xl shadow-lg mb-4">🏆</div>
                    <h2 class="text-4xl font-black text-slate-800 mb-1">Kết quả của bạn</h2>
                    <p class="text-blue-600 font-bold text-lg">Hoàn thành xuất sắc!</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
                    <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-2xl border border-blue-200 shadow-sm text-center">
                        <p class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-1">Điểm số</p>
                        <p id="final-score" class="text-5xl font-black text-blue-700">0</p>
                        <p class="text-sm text-blue-500 mt-1">/ tổng điểm</p>
                    </div>
                    <div class="bg-gradient-to-br from-slate-50 to-slate-100 p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                        <p class="text-sm font-bold text-slate-600 uppercase tracking-wider mb-1">Thời gian</p>
                        <p id="final-time" class="text-5xl font-black text-slate-700">00:00</p>
                    </div>
                    <div class="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-2xl border border-green-200 shadow-sm text-center">
                        <p class="text-sm font-bold text-green-600 uppercase tracking-wider mb-1">Tỷ lệ đúng</p>
                        <p id="final-percent" class="text-5xl font-black text-green-700">0%</p>
                    </div>
                </div>

                <div id="detail-result-container">
                    <h3 class="text-2xl font-bold text-slate-800 mb-6 text-center">Chi tiết từng câu</h3>
                    <div id="detail-questions-list" class="space-y-6"></div>
                </div>

                <button onclick="location.reload()" class="btn-main pill-shape py-5 px-12 font-bold text-lg w-full mt-10 shadow-lg">Làm lại bài kiểm tra</button>
            </div>
        </div>
    </div>

    <script>
        if (typeof quizData === 'undefined') {
            window.quizData = {
                title: "Bài kiểm tra mẫu - Cập nhật 2026",
                config: { testDuration: 1800 },
                questions: Array.from({length: 50}, (_, i) => ({
                    type: "multiple",
                    question: `Câu hỏi mẫu số ${i+1}`,
                    options: ["A", "B", "C", "D"],
                    correct: 0,
                    points: 10,
                    explanation: "Đây là đáp án mẫu."
                }))
            };
        }
    </script>

    <script src="data.js"></script>

    <script>
        let apiKey = "";
        let quizMode = 'practice';
        let currentIndex = 0;
        let timerSeconds = 0;
        let timerInterval;
        let userAnswers = [];
        let sessionScore = 0;
        let questionResults = [];
        let questionEarned = [];

        window.onload = () => {
            if (typeof quizData !== 'undefined') {
                document.getElementById('quiz-title-display').innerText = quizData.title || "EduSpace by ND Labs";
                document.getElementById('page-title').innerText = quizData.title || "EduSpace by ND Labs";
            }
        };

        function showModal(title, text, type = 'info', onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            document.getElementById('modal-icon').innerText = type === 'warn' ? '⚠️' : (type === 'help' ? '💡' : '🔔');
            cancelBtn.classList.toggle('hidden', type !== 'confirm');
            modal.style.display = 'flex';
            confirmBtn.onclick = () => { modal.style.display = 'none'; if(onConfirm) onConfirm(); };
            cancelBtn.onclick = () => { modal.style.display = 'none'; };
        }

        function showHelp() {
            showModal("Về API Key", "API Key giúp AI chấm điểm câu hỏi tự luận và đưa ra giải thích chi tiết.", 'help');
        }

        function goBackToStart() {
            showModal("Xác nhận", "Dữ liệu đang làm sẽ bị mất. Bạn muốn thoát?", "confirm", () => {
                clearInterval(timerInterval);
                document.getElementById('main-quiz').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            });
        }

        function initQuiz(mode) {
            apiKey = document.getElementById('api-key-input').value.trim();
            quizMode = mode;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-quiz').classList.remove('hidden');
            userAnswers = new Array(quizData.questions.length).fill(null);
            questionResults = new Array(quizData.questions.length).fill(null);
            questionEarned = new Array(quizData.questions.length).fill(0);
            currentIndex = 0;
            sessionScore = 0;

            if (quizMode === 'test') {
                timerSeconds = quizData.config.testDuration || 600;
                document.getElementById('prev-btn').classList.remove('hidden');
                document.getElementById('next-nav-btn').classList.remove('hidden');
                document.getElementById('finish-test-btn').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');
            } else {
                timerSeconds = 0;
                document.getElementById('prev-btn').classList.add('hidden');
                document.getElementById('next-nav-btn').classList.add('hidden');
                document.getElementById('finish-test-btn').classList.add('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');
            }
            startTimer();
            loadQuestion();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            const display = document.getElementById('timer-text');
            timerInterval = setInterval(() => {
                quizMode === 'test' ? timerSeconds-- : timerSeconds++;
                if (timerSeconds < 0 && quizMode === 'test') { finishTest(); return; }
                const m = Math.floor(Math.abs(timerSeconds) / 60).toString().padStart(2, '0');
                const s = (Math.abs(timerSeconds) % 60).toString().padStart(2, '0');
                display.innerText = `${m}:${s}`;
            }, 1000);
        }

        function getTFScorePercent(correctCount) {
            if (correctCount === 1) return 0.10;
            if (correctCount === 2) return 0.25;
            if (correctCount === 3) return 0.50;
            if (correctCount === 4) return 1.00;
            return 0;
        }

        function renderQuestionProgress() {
            const bar = document.getElementById('question-progress-bar');
            bar.innerHTML = '';
            quizData.questions.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = 'question-progress-item';
                item.textContent = i + 1;

                if (i === currentIndex) item.classList.add('current');
                if (userAnswers[i] !== null && userAnswers[i] !== undefined) item.classList.add('answered');
                if (questionResults[i] === true) item.classList.add('correct');
                if (questionResults[i] === false) item.classList.add('incorrect');

                item.onclick = () => {
                    currentIndex = i;
                    loadQuestion();
                };
                bar.appendChild(item);
            });

            // LUÔN scroll về đầu (câu 1) khi load mới
            bar.scrollLeft = 0;
        }

        function loadQuestion() {
            const q = quizData.questions[currentIndex];
            const type = q.type || 'multiple';

            document.getElementById('ui-progress').innerText = `Câu ${currentIndex + 1}/${quizData.questions.length}`;
            document.getElementById('explanation-container').classList.add('hidden');

            const submitBtn = document.getElementById('submit-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextNavBtn = document.getElementById('next-nav-btn');

            if (quizMode === 'practice') {
                submitBtn.classList.remove('hidden');
                submitBtn.disabled = !hasUserAnsweredCurrent();
            } else {
                prevBtn.disabled = currentIndex === 0;
                nextNavBtn.disabled = currentIndex === quizData.questions.length - 1;
            }

            let imgHtml = q.image ? `
                <div class="q-image-container">
                    <img src="${q.image}" alt="Hình ảnh câu ${currentIndex + 1}" 
                         onerror="this.src='https://via.placeholder.com/600x300?text=Hinh+Anh+Khong+Ton+Tai';">
                </div>` : '';

            const questionText = q.question || '';

            document.getElementById('question-header').innerHTML = `
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">
                    Câu ${currentIndex + 1} • ${q.points || 0} điểm
                </p>
                ${imgHtml}
                <div class="question-content text-xl font-extrabold leading-tight prose prose-slate max-w-none">
                    ${questionText}
                </div>
            `;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            if (type === 'multiple') {
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('div');
                    btn.className = `option-card p-4 pl-6 pr-6 flex items-center gap-4 ${userAnswers[currentIndex] === i ? 'selected' : ''}`;
                    btn.innerHTML = `<span class="w-8 h-8 flex items-center justify-center pill-shape bg-slate-100 text-slate-400 font-black text-[10px]">${String.fromCharCode(65 + i)}</span><span class="font-bold text-sm flex-1">${opt}</span>`;
                    btn.onclick = () => { 
                        if(quizMode === 'practice' && !document.getElementById('explanation-container').classList.contains('hidden')) return; 
                        selectAns(i); 
                    };
                    container.appendChild(btn);
                });
            } 
            else if (type === 'truefalse') {
                if (!userAnswers[currentIndex] || !Array.isArray(userAnswers[currentIndex])) {
                    userAnswers[currentIndex] = Array(4).fill(null);
                }

                const statements = q.statements || ["Ý A", "Ý B", "Ý C", "Ý D"];

                statements.forEach((text, idx) => {
                    const row = document.createElement('div');
                    row.className = 'tf-row';

                    const label = document.createElement('span');
                    label.className = 'tf-label';
                    label.textContent = String.fromCharCode(65 + idx);

                    const content = document.createElement('span');
                    content.className = 'tf-content';
                    content.innerHTML = text;

                    const trueBtn = document.createElement('div');
                    trueBtn.className = `tf-btn ${userAnswers[currentIndex][idx] === true ? 'selected' : ''}`;
                    trueBtn.textContent = 'ĐÚNG';

                    const falseBtn = document.createElement('div');
                    falseBtn.className = `tf-btn ${userAnswers[currentIndex][idx] === false ? 'selected' : ''}`;
                    falseBtn.textContent = 'SAI';

                    trueBtn.onclick = () => {
                        if (document.getElementById('explanation-container').classList.contains('hidden')) {
                            userAnswers[currentIndex][idx] = true;
                            updateTFVisual(idx);
                            if (quizMode === 'practice') submitBtn.disabled = false;
                        }
                    };

                    falseBtn.onclick = () => {
                        if (document.getElementById('explanation-container').classList.contains('hidden')) {
                            userAnswers[currentIndex][idx] = false;
                            updateTFVisual(idx);
                            if (quizMode === 'practice') submitBtn.disabled = false;
                        }
                    };

                    row.append(label, content, trueBtn, falseBtn);
                    container.appendChild(row);
                });
            } 
            else if (type === 'short' || type === 'essay') {
                const isShort = type === 'short';
                if (isShort) {
                    container.innerHTML = `
                        <div class="short-ans-container">
                            <input type="text" id="ans-input" maxlength="4" class="input-short" placeholder="••••">
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <textarea id="ans-input" placeholder="Viết câu trả lời của bạn tại đây..."></textarea>
                    `;
                }
               
                const input = document.getElementById('ans-input');
                if (userAnswers[currentIndex] !== null) {
                    input.value = userAnswers[currentIndex];
                }

                if (isShort) {
                    input.onkeypress = (e) => {
                        const allowed = /[0-9\.\-,]/;
                        if (!allowed.test(e.key)) {
                            e.preventDefault();
                            return false;
                        }
                    };

                    input.oninput = (e) => {
                        let val = e.target.value.replace(/[^0-9\.\-,]/g, '');
                        if (val.length > 4) val = val.slice(0, 4);
                        e.target.value = val;
                        userAnswers[currentIndex] = val;

                        if (quizMode === 'practice') {
                            submitBtn.disabled = val.trim().length === 0;
                        }
                    };
                } else {
                    input.oninput = (e) => {
                        userAnswers[currentIndex] = e.target.value;
                        if (quizMode === 'practice') {
                            submitBtn.disabled = e.target.value.trim().length === 0;
                        }
                    };
                }

                input.focus();
            }

            renderMath();
            renderQuestionProgress();
        }

        function updateTFVisual(idx) {
            const rows = document.querySelectorAll('.tf-row');
            if (!rows[idx]) return;
            const trueBtn = rows[idx].querySelectorAll('.tf-btn')[0];
            const falseBtn = rows[idx].querySelectorAll('.tf-btn')[1];
            trueBtn.classList.toggle('selected', userAnswers[currentIndex][idx] === true);
            falseBtn.classList.toggle('selected', userAnswers[currentIndex][idx] === false);
        }

        function hasUserAnsweredCurrent() {
            const q = quizData.questions[currentIndex];
            if (q.type === 'truefalse') {
                return userAnswers[currentIndex] && userAnswers[currentIndex].some(v => v !== null);
            } else if (q.type === 'multiple') {
                return userAnswers[currentIndex] !== null;
            } else {
                return (userAnswers[currentIndex] || '').trim().length > 0;
            }
        }

        function selectAns(idx) {
            userAnswers[currentIndex] = idx;
            document.querySelectorAll('.option-card').forEach((o, i) => o.classList.toggle('selected', i === idx));
            if (quizMode === 'practice') document.getElementById('submit-btn').disabled = false;
        }

        async function handlePractice() {
            const q = quizData.questions[currentIndex];
            const badge = document.getElementById('result-badge');
            const expText = document.getElementById('explanation-text');
            const submitBtn = document.getElementById('submit-btn');
            let earned = 0;
            let isCorrectThisTime = false;

            if (q.type === 'truefalse') {
                let correctCount = 0;
                const correctAnswers = q.correctAnswers || Array(4).fill(false);
                userAnswers[currentIndex].forEach((userChoice, i) => {
                    if (userChoice !== null && userChoice === correctAnswers[i]) correctCount++;
                });
                const percent = getTFScorePercent(correctCount);
                earned = percent * (q.points || 0);
                isCorrectThisTime = percent >= 0.5;

                badge.innerText = `Đúng ${correctCount}/4 → ${Math.round(percent * 100)}%`;
                badge.className = `pill-shape px-4 py-1.5 text-[9px] font-black uppercase text-white ${percent >= 0.5 ? 'bg-emerald-500' : percent > 0 ? 'bg-amber-500' : 'bg-rose-500'}`;

                let html = '<div class="space-y-3">';
                q.statements.forEach((st, i) => {
                    const user = userAnswers[currentIndex][i] === null ? '—' : (userAnswers[currentIndex][i] ? 'ĐÚNG' : 'SAI');
                    const right = correctAnswers[i] ? 'ĐÚNG' : 'SAI';
                    const color = user === right ? 'text-emerald-600' : 'text-rose-600';
                    html += `<p><strong>${String.fromCharCode(65 + i)}.</strong> ${st}<br><span class="${color}">Bạn chọn: ${user} | Đáp án: ${right}</span></p>`;
                });
                html += '</div>';
                if (q.explanation) html += `<div class="mt-6 pt-4 border-t border-slate-200 explanation-content">${q.explanation}</div>`;
                expText.innerHTML = html;
            } 
            else if (q.type === 'essay') {
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<div class="spinner"></div>`;
                const res = await gradeAI(q.question, userAnswers[currentIndex], q.suggested || "");
                earned = Math.round(res.score * q.points * 10) / 10;
                isCorrectThisTime = res.score >= 0.6;
                badge.innerText = `Điểm: ${earned} / ${q.points}`;
                badge.className = `pill-shape px-4 py-1.5 text-[9px] font-black uppercase text-white ${res.score > 0.6 ? 'bg-emerald-500' : 'bg-rose-500'}`;
                expText.innerHTML = `<div class="explanation-content">${res.feedback || "Không có phản hồi từ AI."}</div>`;
                submitBtn.innerHTML = "Kiểm tra";
            } 
            else {
                let isCorrect = false;
                if (q.type === 'short') {
                    const cleanU = (userAnswers[currentIndex] || '').trim().toLowerCase();
                    const cleanC = String(q.correct).trim().toLowerCase();
                    isCorrect = cleanU === cleanC;
                } else {
                    isCorrect = userAnswers[currentIndex] === q.correct;
                }
                earned = isCorrect ? (q.points || 0) : 0;
                isCorrectThisTime = isCorrect;
                badge.innerText = isCorrect ? "Chính xác" : "Chưa đúng";
                badge.className = `pill-shape px-4 py-1.5 text-[9px] font-black uppercase text-white ${isCorrect ? 'bg-emerald-500' : 'bg-rose-500'}`;
                expText.innerHTML = `<div class="explanation-content">${q.explanation || `Đáp án đúng: ${q.options?.[q.correct] || q.correct || ''}`}</div>`;
            }

            sessionScore += earned;
            questionResults[currentIndex] = isCorrectThisTime;
            questionEarned[currentIndex] = earned;
            document.getElementById('explanation-container').classList.remove('hidden');
            submitBtn.classList.add('hidden');
            renderMath();
            renderQuestionProgress();
        }

        async function gradeAI(q, u, s) {
            if (!apiKey) return { score: 0.5, feedback: "<p class='text-amber-600'>Vui lòng nhập API Key để AI chấm điểm chính xác hơn.</p>" };
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chấm điểm câu trả lời: Câu hỏi: "${q}", Trả lời của HS: "${u}", Đáp án gợi ý: "${s}". Chấm thang 0-1 (số thập phân) và đưa ra nhận xét ngắn gọn bằng HTML tiếng Việt. Trả về JSON: {"score": 0.8, "feedback": "..."}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await res.json();
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) {
                return { score: 0, feedback: "Lỗi kết nối AI. Vui lòng kiểm tra API Key." };
            }
        }

        async function finishTest() {
            clearInterval(timerInterval);
            const container = document.getElementById('quiz-container');
            container.innerHTML = `<div class="glass-card round-card p-20 flex flex-col items-center justify-center"><div class="spinner !border-blue-500 !w-10 !h-10 mb-4"></div><p class="font-bold text-slate-400 uppercase tracking-widest text-[10px]">Đang tổng hợp điểm...</p></div>`;

            let total = 0;
            let totalPoints = 0;
            quizData.questions.forEach(q => totalPoints += q.points || 0);

            for (let i = 0; i < quizData.questions.length; i++) {
                const q = quizData.questions[i];
                const u = userAnswers[i];
                let earned = 0;
                let isCorrect = false;

                if (q.type === 'truefalse') {
                    if (!Array.isArray(u)) continue;
                    let correctCount = 0;
                    const correct = q.correctAnswers || [];
                    u.forEach((choice, idx) => {
                        if (choice !== null && choice === correct[idx]) correctCount++;
                    });
                    const percent = getTFScorePercent(correctCount);
                    earned = percent * (q.points || 0);
                    isCorrect = percent >= 0.5;
                }
                else if (q.type === 'essay') {
                    if (u) {
                        const res = await gradeAI(q.question, u, q.suggested || "");
                        earned = Math.round(res.score * (q.points || 0) * 10) / 10;
                        isCorrect = res.score >= 0.6;
                    }
                }
                else if (q.type === 'short') {
                    if (u && String(u).trim().toLowerCase() === String(q.correct).trim().toLowerCase()) {
                        earned = q.points || 0;
                        isCorrect = true;
                    }
                }
                else if (u === q.correct) {
                    earned = q.points || 0;
                    isCorrect = true;
                }

                total += earned;
                questionResults[i] = isCorrect;
                questionEarned[i] = earned;
            }

            document.getElementById('final-score').innerText = `${Math.round(total*10)/10} / ${totalPoints}`;
            document.getElementById('final-time').innerText = document.getElementById('timer-text').innerText;
            document.getElementById('final-percent').innerText = totalPoints > 0 ? Math.round((total / totalPoints) * 100) + '%' : '0%';

            renderDetailResults();

            document.getElementById('main-quiz').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function renderDetailResults() {
            const list = document.getElementById('detail-questions-list');
            list.innerHTML = '';

            quizData.questions.forEach((q, i) => {
                const earned = questionEarned[i] || 0;
                const statusClass = questionResults[i] === true ? 'correct' : (questionResults[i] === false ? 'incorrect' : '');
                const icon = questionResults[i] === true ? '✅' : (questionResults[i] === false ? '❌' : '❓');

                const div = document.createElement('div');
                div.className = `detail-question ${statusClass}`;
                div.innerHTML = `
                    <div class="detail-question-header">
                        <h4>Câu ${i+1} ${icon}</h4>
                        <span class="detail-score">${earned} / ${q.points || 0}</span>
                    </div>
                    <div class="question-content font-medium mb-3">${q.question}</div>
                    <p class="detail-your-answer">Bạn chọn: ${formatUserAnswer(q, userAnswers[i])}</p>
                    <p class="detail-correct-answer">Đáp án đúng: ${formatCorrectAnswer(q)}</p>
                    <div class="detail-explanation explanation-content">${q.explanation || 'Không có giải thích chi tiết.'}</div>
                `;
                list.appendChild(div);
            });
        }

        function formatUserAnswer(q, ans) {
            if (ans === null || ans === undefined) return 'Chưa trả lời';
            if (q.type === 'multiple') return q.options[ans] || '—';
            if (q.type === 'truefalse') {
                if (!Array.isArray(ans)) return 'Chưa chọn';
                return ans.map((v,i) => v === null ? '—' : (v ? 'ĐÚNG' : 'SAI')).join(', ');
            }
            return ans.toString() || '—';
        }

        function formatCorrectAnswer(q) {
            if (q.type === 'multiple') return q.options[q.correct];
            if (q.type === 'truefalse') return q.correctAnswers.map(v => v ? 'ĐÚNG' : 'SAI').join(', ');
            if (q.type === 'short') return q.correct;
            if (q.type === 'essay') return 'Xem gợi ý trong đề';
            return '—';
        }

        function nextStep() {
            if (currentIndex < quizData.questions.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                if (quizMode === 'test') {
                    showModal("Nộp bài", "Bạn đã hoàn thành các câu hỏi. Nộp bài ngay?", "confirm", finishTest);
                } else {
                    finishTest();
                }
            }
        }

        window.onkeydown = (e) => {
            if (document.getElementById('main-quiz').classList.contains('hidden')) return;
            if (e.key === 'Enter') {
                const expVisible = !document.getElementById('explanation-container').classList.contains('hidden');
                if (expVisible) {
                    nextStep();
                } else if (quizMode === 'practice' && !document.getElementById('submit-btn').disabled) {
                    handlePractice();
                } else if (quizMode === 'test') {
                    nextStep();
                }
            }
        };

        document.getElementById('submit-btn').onclick = handlePractice;
        document.getElementById('next-btn-exp').onclick = nextStep;
        document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0) { currentIndex--; loadQuestion(); } };
        document.getElementById('next-nav-btn').onclick = nextStep;
        document.getElementById('finish-test-btn').onclick = () => showModal("Xác nhận", "Bạn muốn nộp bài ngay?", "confirm", finishTest);

        function renderMath() {
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }
    </script>
</body>
</html>
